<script type="module">
/* =========================================================================
   FIREBASE INIT — fill in your project config below.
   Firebase Console → Project settings → General → Your apps → Web app.
   Also enable: Authentication → Sign-in method → Email/Password, and
   create a Firestore database (production mode), then deploy the rules
   in firestore.rules from this project's output folder.
   ========================================================================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword,
  createUserWithEmailAndPassword, signOut, updateProfile
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, collection, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let fbApp, fbAuth, fbDb, fbEnabled = false;
try {
  fbApp = initializeApp(firebaseConfig);
  fbAuth = getAuth(fbApp);
  fbDb = getFirestore(fbApp);
  fbEnabled = firebaseConfig.apiKey !== "YOUR_API_KEY";
} catch (e) {
  console.warn('Firebase not initialized — check firebaseConfig.', e);
}

window.fb = {
  enabled: fbEnabled, auth: fbAuth, db: fbDb,
  signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile,
  doc, getDoc, setDoc, collection, serverTimestamp
};

if (fbEnabled) {
  onAuthStateChanged(fbAuth, (user) => {
    window.dispatchEvent(new CustomEvent('fb-auth-changed', { detail: user }));
  });
} else {
  console.warn('ATELIER NOIR: Firebase config is still using placeholder values. Auth/cart persistence will run in local-only demo mode until you add your project keys near the top of the <script type="module"> block.');
}
</script>

<script type="module">
/* =========================================================================
   ATELIER NOIR — single-file demo storefront + admin shell
   No build step. Tailwind via CDN. Vanilla JS hash router.
   Auth, cart and wishlist persist to Firebase/Firestore when configured
   above; otherwise everything runs in-memory so the site still works
   standalone. Stripe checkout posts to /api/create-checkout-session and
   /api/verify-session (see the api/ folder) — those only work once
   deployed to Vercel with STRIPE_SECRET_KEY set.
   ========================================================================= */

/* ---------------------------- DATA ---------------------------- */
const CATEGORIES = ['Men','Women','Kids','Accessories'];
const COLORS = ['Black','Ivory','Camel','Olive','Charcoal','Gold'];
const SIZE_SETS = {
  apparel: ['XS','S','M','L','XL','XXL'],
  kids: ['2-3Y','4-5Y','6-7Y','8-9Y','10-11Y'],
  access: ['One Size']
};
const BRANDS = ['Atelier Noir','Noir Studio','La Maison'];

function img(seed, w=900, h=1125){ return `https://picsum.photos/seed/${seed}/${w}/${h}`; }

const NAMES = {
  Men: ['Tailored Wool Overcoat','Merino Crewneck Sweater','Slim Oxford Shirt','Pleated Trousers','Cashmere Turtleneck','Structured Bomber Jacket','Selvedge Denim Jean','Silk-Blend Bomber','Double-Breasted Blazer','Cotton Twill Chino'],
  Women: ['Silk Wrap Blouse','Wool Midi Coat','Draped Satin Dress','Tailored Trouser Suit','Cashmere Wrap Cardigan','Pleated Midi Skirt','Silk Slip Dress','Belted Trench Coat','Ribbed Knit Bodysuit','Linen Shirt Dress'],
  Kids: ['Cotton Knit Sweater','Corduroy Overalls','Wool-Blend Peacoat','Organic Cotton Tee Set','Quilted Puffer Vest','Pleated Party Dress'],
  Accessories: ['Leather Belt','Silk Twill Scarf','Structured Tote Bag','Cashmere Beanie','Leather Card Holder','Gold-Tone Cufflinks','Leather Ankle Boot','Aviator Sunglasses']
};

const REVIEW_POOL = [
  {name:'Amara O.', text:'The fabric is heavier than I expected in the best way. Fits true to size and the stitching detail on the cuffs is a nice touch.', rating:5},
  {name:'Daniel K.', text:'Runs slightly large so I would size down. The colour in person is richer than the photos show.', rating:4},
  {name:'Priya S.', text:'Ordered this for a work trip and it packed without a single crease. Genuinely impressed with the finish.', rating:5},
  {name:'Tunde A.', text:'Good piece overall, took about a week longer to arrive than the estimate but customer care was responsive.', rating:4},
  {name:'Grace L.', text:'This is my third order from Atelier Noir and the quality has been consistent every time.', rating:5},
  {name:'Michael B.', text:'Nice weight to the material, lining feels durable. Would like a couple more colour options.', rating:4},
];

function buildProducts(){
  let id = 1; const list = [];
  Object.entries(NAMES).forEach(([cat, names])=>{
    names.forEach((name, i)=>{
      const gender = cat;
      const sizeSet = cat==='Kids' ? SIZE_SETS.kids : (cat==='Accessories' ? SIZE_SETS.access : SIZE_SETS.apparel);
      const price = cat==='Accessories' ? (40 + (i*17)%160) : (85 + (i*23)%260);
      const onSale = (id % 5 === 0);
      const isNew = (id % 4 === 0);
      const isBest = (id % 3 === 0);
      const stock = (id % 7 === 0) ? 0 : (3 + (id*13)%40);
      const colors = COLORS.filter((_,ci)=> (id+ci)%3!==0).slice(0,3);
      const reviews = [REVIEW_POOL[id%REVIEW_POOL.length], REVIEW_POOL[(id+2)%REVIEW_POOL.length]];
      const rating = (reviews.reduce((s,r)=>s+r.rating,0)/reviews.length);
      list.push({
        id, sku:`AN-${1000+id}`, name, category:cat, gender, brand: BRANDS[id%BRANDS.length],
        price, compareAt: onSale ? Math.round(price*1.35) : null,
        sizes:sizeSet, colors, stock, isNew, isBest, onSale,
        rating: Math.round(rating*10)/10, reviewsCount: 24 + (id*7)%180,
        images:[img('an'+id+'a'), img('an'+id+'b')],
        description:`A considered piece cut from responsibly sourced material, finished by hand in our workshop. The ${name.toLowerCase()} is built for repeat wear across seasons — pair it back with the rest of the ${cat.toLowerCase()} edit.`,
        reviews
      });
      id++;
    });
  });
  return list;
}
const PRODUCTS = buildProducts();

/* ---------------------------- STATE ---------------------------- */
const STATE = {
  cart: [],        // {productId, size, color, qty}
  wishlist: [],     // productIds
  user: null,       // {name, email}
  dark: false,
  toastTimer: null,
};

/* ---------------------------- BACKEND HOOKS ----------------------------
   Firebase/Firestore-backed when window.fb.enabled is true (real config
   supplied above); otherwise falls back to local-only demo behaviour so
   the site keeps working before you've set up a project. Every place in
   the UI that mutates cart/wishlist/auth/orders calls through here. */
const STORE = {
  async signIn(email, pass){
    if(!window.fb.enabled){ const u={uid:'local-'+email, name:email.split('@')[0], email}; STATE.user=u; return u; }
    const cred = await window.fb.signInWithEmailAndPassword(window.fb.auth, email, pass);
    return cred.user;
  },
  async register(name, email, pass){
    if(!window.fb.enabled){ const u={uid:'local-'+email, name, email}; STATE.user=u; return u; }
    const cred = await window.fb.createUserWithEmailAndPassword(window.fb.auth, email, pass);
    await window.fb.updateProfile(cred.user, { displayName: name });
    await window.fb.setDoc(window.fb.doc(window.fb.db, 'users', cred.user.uid), { name, email, createdAt: window.fb.serverTimestamp() });
    return cred.user;
  },
  async signOut(){
    if(window.fb.enabled) await window.fb.signOut(window.fb.auth);
    STATE.user = null;
  },
  async loadCart(uid){
    if(!window.fb.enabled) return [];
    const snap = await window.fb.getDoc(window.fb.doc(window.fb.db,'carts',uid));
    return snap.exists() ? (snap.data().items || []) : [];
  },
  async saveCart(uid, items){
    if(!window.fb.enabled) return;
    try{ await window.fb.setDoc(window.fb.doc(window.fb.db,'carts',uid), { items, updatedAt: window.fb.serverTimestamp() }); }
    catch(e){ console.warn('Could not save cart to Firestore:', e.message); }
  },
  async loadWishlist(uid){
    if(!window.fb.enabled) return [];
    const snap = await window.fb.getDoc(window.fb.doc(window.fb.db,'wishlists',uid));
    return snap.exists() ? (snap.data().productIds || []) : [];
  },
  async saveWishlist(uid, productIds){
    if(!window.fb.enabled) return;
    try{ await window.fb.setDoc(window.fb.doc(window.fb.db,'wishlists',uid), { productIds, updatedAt: window.fb.serverTimestamp() }); }
    catch(e){ console.warn('Could not save wishlist to Firestore:', e.message); }
  },
  async placeOrder(order){
    const id = 'AN-'+Math.floor(100000+Math.random()*900000);
    const full = { ...order, id, status: order.status || 'Processing', uid: STATE.user?.uid || null, placedAt: new Date().toISOString() };
    if(window.fb.enabled){
      try{ await window.fb.setDoc(window.fb.doc(window.fb.db,'orders', id), { ...full, createdAt: window.fb.serverTimestamp() }); }
      catch(e){ console.warn('Order not saved to Firestore (check config/rules):', e.message); }
    }
    return full;
  },
};

async function onUserSignedIn(fbUser){
  STATE.user = { uid: fbUser.uid, name: fbUser.displayName || fbUser.email.split('@')[0], email: fbUser.email };
  const [remoteCart, remoteWishlist] = await Promise.all([ STORE.loadCart(fbUser.uid), STORE.loadWishlist(fbUser.uid) ]);
  // merge any guest-session items with what's saved to the account
  remoteCart.forEach(ri=>{
    const existing = STATE.cart.find(i=>i.productId===ri.productId && i.size===ri.size && i.color===ri.color);
    if(existing) existing.qty = Math.max(existing.qty, ri.qty); else STATE.cart.push(ri);
  });
  remoteWishlist.forEach(id=>{ if(!STATE.wishlist.includes(id)) STATE.wishlist.push(id); });
  await Promise.all([ STORE.saveCart(fbUser.uid, STATE.cart), STORE.saveWishlist(fbUser.uid, STATE.wishlist) ]);
  renderNav();
  go(location.hash);
}
function onUserSignedOut(){
  STATE.user = null; STATE.cart = []; STATE.wishlist = [];
  renderNav(); go(location.hash);
}
window.addEventListener('fb-auth-changed', (e)=>{ if(e.detail) onUserSignedIn(e.detail); else onUserSignedOut(); });
/* ------------------------------------------------------------------------ */

const fmt = (n)=> '$' + n.toFixed(2);
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(STATE.toastTimer);
  STATE.toastTimer = setTimeout(()=> t.classList.remove('show'), 2400);
}
function cartCount(){ return STATE.cart.reduce((s,i)=>s+i.qty,0); }
function cartTotal(){ return STATE.cart.reduce((s,i)=>{ const p=PRODUCTS.find(p=>p.id===i.productId); return s + (p.onSale?p.price:p.price) * i.qty; },0); }
function findProduct(id){ return PRODUCTS.find(p=>p.id===+id); }

function persistCart(){ if(STATE.user) STORE.saveCart(STATE.user.uid, STATE.cart); }
function persistWishlist(){ if(STATE.user) STORE.saveWishlist(STATE.user.uid, STATE.wishlist); }

function addToCart(productId, size, color, qty=1){
  const existing = STATE.cart.find(i=>i.productId===productId && i.size===size && i.color===color);
  if(existing) existing.qty += qty; else STATE.cart.push({productId, size, color, qty});
  renderNav(); persistCart();
  toast('Added to bag');
}
function removeFromCart(idx){ STATE.cart.splice(idx,1); renderNav(); persistCart(); go(location.hash); }
function updateCartQty(idx, qty){ if(qty<1) return; STATE.cart[idx].qty = qty; renderNav(); persistCart(); go(location.hash); }
function toggleWishlist(productId){
  const i = STATE.wishlist.indexOf(productId);
  if(i>-1){ STATE.wishlist.splice(i,1); toast('Removed from wishlist'); } else { STATE.wishlist.push(productId); toast('Saved to wishlist'); }
  renderNav(); persistWishlist();
}

      <div class="flex items-center gap-4">

          <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M12 20s-7.5-4.6-9.7-9A5.3 5.3 0 0112 6.5 5.3 5.3 0 0121.7 11c-2.2 4.4-9.7 9-9.7 9z" stroke="currentColor" stroke-width="1.4"/></svg>
          ${STATE.wishlist.length? `<span class="absolute -top-1 -right-1 bg-gold text-ink text-[10px] w-4 h-4 rounded-full flex items-center justify-center">${STATE.wishlist.length}</span>`:''}
        </a>

          <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M6 8h12l-1 12H7L6 8z" stroke="currentColor" stroke-width="1.4"/><path d="M9 8V6a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.4"/></svg>
          ${cartCount()? `<span class="absolute -top-1 -right-1 bg-ink dark:bg-gold text-paper dark:text-ink text-[10px] w-4 h-4 rounded-full flex items-center justify-center">${cartCount()}</span>`:''}
        </a>
      </div>
    </div>
    <div id="search-bar" class="hidden border-t hairline px-5 md:px-8 py-3">

    </div>
    <div id="mnav" class="hidden md:hidden border-t hairline px-5 py-4 flex flex-col gap-4 text-sm uppercase tracking-widest">
      <a href="#/shop">Shop</a><a href="#/category/Women">Women</a><a href="#/category/Men">Men</a><a href="#/category/Kids">Kids</a><a href="#/category/Accessories">Accessories</a><a href="#/new-arrivals">New Arrivals</a><a href="#/best-sellers">Best Sellers</a><a href="#/sale">Sale</a>

        <p class="text-sm text-white/60 max-w-xs leading-relaxed">Considered clothing for men, women and kids, cut from honest material and made to be worn for years, not seasons.</p>
        <div class="flex gap-4 mt-6">

  return `<span class="text-gold text-sm" aria-label="${rating} out of 5 stars">${'★'.repeat(full)}${'☆'.repeat(5-full)}</span>`;
}

function bindWishButtons(scope=document){
  scope.querySelectorAll('[data-wish]').forEach(btn=>{
    btn.onclick = (e)=>{ e.preventDefault(); toggleWishlist(+btn.dataset.wish); go(location.hash); };
  });
}

function revealOnScroll(){
  const els = document.querySelectorAll('.reveal');
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });
  }, {threshold:.12});
  els.forEach(el=>io.observe(el));
}

  if(q) list = list.filter(p=> p.name.toLowerCase().includes(q.toLowerCase()) || p.category.toLowerCase().includes(q.toLowerCase()));

  const perPage = 8;
  const page = opts.page||1;

  return `

function bindShopEvents(){
  const toggle = document.querySelector('[data-sort-toggle]');
  const panel = document.getElementById('filter-panel');
  if(toggle) toggle.onclick = ()=> panel.classList.toggle('hidden');
  const price = document.getElementById('f-price');
  if(price) price.oninput = ()=> document.getElementById('price-val').textContent = '$'+price.value;
  const gridBtn = document.getElementById('view-grid'), listBtn=document.getElementById('view-list');
  const applyBtn = document.getElementById('apply-filters');
  if(applyBtn) applyBtn.onclick = ()=>{
    const grid = document.getElementById('product-grid'); if(!grid) return;
    const cats = [...document.querySelectorAll('.f-cat:checked')].map(c=>c.value);
    const sizes = [...document.querySelectorAll('.f-size:checked')].map(c=>c.value);
    const colors = [...document.querySelectorAll('.f-color:checked')].map(c=>c.value);
    const brands = [...document.querySelectorAll('.f-brand:checked')].map(c=>c.value);
    const inStock = document.getElementById('f-stock').checked;
    const maxPrice = +price.value;
    let list = PRODUCTS.filter(p=>
      (!cats.length || cats.includes(p.category)) &&
      (!sizes.length || p.sizes.some(s=>sizes.includes(s))) &&
      (!colors.length || p.colors.some(c=>colors.includes(c))) &&
      (!brands.length || brands.includes(p.brand)) &&
      (!inStock || p.stock>0) &&
      p.price<=maxPrice
    );
    grid.innerHTML = list.length? list.map(p=>productCard(p)).join('') : `<div class="col-span-full text-center py-24"><p class="font-display text-2xl mb-2">No products match your filters</p></div>`;
    bindWishButtons(grid);
    toast(`${list.length} products found`);
  };
  const sortSel = document.getElementById('sort-select');
  if(sortSel) sortSel.onchange = ()=>{
    const grid = document.getElementById('product-grid'); if(!grid) return;
    let list = PRODUCTS.slice();
    if(sortSel.value==='price-asc') list.sort((a,b)=>a.price-b.price);
    else if(sortSel.value==='price-desc') list.sort((a,b)=>b.price-a.price);
    else if(sortSel.value==='rating') list.sort((a,b)=>b.rating-a.rating);
    else if(sortSel.value==='popular') list.sort((a,b)=>b.reviewsCount-a.reviewsCount);
    else list.sort((a,b)=>b.id-a.id);
    grid.innerHTML = list.slice(0,8).map(p=>productCard(p)).join('');
    bindWishButtons(grid);
  };
  if(gridBtn) gridBtn.onclick = ()=>{
    const grid = document.getElementById('product-grid'); if(!grid) return;
    grid.className = 'grid grid-cols-2 md:grid-cols-4 gap-x-5 gap-y-10';
  };
  if(listBtn) listBtn.onclick = ()=>{
    const grid = document.getElementById('product-grid'); if(!grid) return;
    const ids = [...grid.querySelectorAll('[data-wish]')].map(b=>+b.dataset.wish);
    grid.className = 'flex flex-col';
    grid.innerHTML = ids.map(id=>productCard(findProduct(id),'list')).join('');
    bindWishButtons(grid);
  };
}

function bindCheckoutEvents(){
  const form = document.getElementById('checkout-form');
  if(!form) return;
  form.onsubmit = async (e)=>{
    e.preventDefault();
    const submitBtn = form.querySelector('button[type=submit]');
    const label = submitBtn.textContent;
    submitBtn.disabled = true; submitBtn.textContent = 'Processing…';

    const items = STATE.cart.map(i=>({...i, product: findProduct(i.productId)}));
    const subtotal = items.reduce((s,i)=>s+i.product.price*i.qty,0);
    const shipping = subtotal>150?0:9.5;
    const payMethod = form.querySelector('input[name=pay]:checked').value;
    const isStripe = payMethod.startsWith('Stripe');

    const order = await STORE.placeOrder({
      items: items.map(i=>({ productId:i.product.id, name:i.product.name, price:i.product.price, size:i.size, color:i.color, qty:i.qty })),
      subtotal, shipping, total: subtotal + shipping, paymentMethod: payMethod,
      status: isStripe ? 'Pending Payment' : 'Processing'
    });

    if(isStripe){
      try{
        const res = await fetch('/api/create-checkout-session', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            items: order.items, orderId: order.id,
            successUrl: window.location.origin + window.location.pathname + `?session_id={CHECKOUT_SESSION_ID}#/order-confirmation/${order.id}`,
            cancelUrl: window.location.origin + window.location.pathname + '#/checkout'
          })
        });
        if(!res.ok) throw new Error('API not available');
        const data = await res.json();
        if(!data.url) throw new Error(data.error || 'Could not start Stripe checkout');
        window.location.href = data.url;
        return;
      } catch(err){
        toast('Stripe isn\'t deployed/configured yet — showing a demo confirmation instead.');
      }
    }
    STATE.cart = []; renderNav();
    location.hash = '#/order-confirmation/'+order.id;
  };
}

function bindAccountEvents(){
  document.querySelectorAll('[data-auth-tab]').forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll('[data-auth-tab]').forEach(b=>b.className='auth-tab flex-1 py-3 text-sm uppercase tracking-widest border-b-2 border-transparent text-stone');
      btn.className = 'auth-tab flex-1 py-3 text-sm uppercase tracking-widest border-b-2 border-ink dark:border-white';
      document.getElementById('login-form').classList.toggle('hidden', btn.dataset.authTab!=='login');
      document.getElementById('register-form').classList.toggle('hidden', btn.dataset.authTab!=='register');
    };
  });
  const lf = document.getElementById('login-form');
  if(lf) lf.onsubmit = async (e)=>{
    e.preventDefault();
    const btn = lf.querySelector('button'); const label = btn.textContent;
    btn.disabled = true; btn.textContent = 'Signing in…';
    try{
      await STORE.signIn(document.getElementById('login-email').value, document.getElementById('login-pass').value);
      toast('Welcome back'); go('#/account');
    } catch(err){ toast(err.message.replace('Firebase: ','')); btn.disabled=false; btn.textContent=label; }
  };
  const rf = document.getElementById('register-form');
  if(rf) rf.onsubmit = async (e)=>{
    e.preventDefault();
    const btn = rf.querySelector('button'); const label = btn.textContent;
    btn.disabled = true; btn.textContent = 'Creating account…';
    try{
      await STORE.register(document.getElementById('reg-name').value, document.getElementById('reg-email').value, document.getElementById('reg-pass').value);
      toast('Account created'); go('#/account');
    } catch(err){ toast(err.message.replace('Firebase: ','')); btn.disabled=false; btn.textContent=label; }
  };
  const so = document.getElementById('signout-btn');
  if(so) so.onclick = async ()=>{ await STORE.signOut(); go('#/account'); };
}

async function verifyPayment(sessionId){
  const el = document.getElementById('payment-verify');
  if(!el) return;
  el.innerHTML = `<p class="text-xs text-stone mt-2">Confirming payment with Stripe…</p>`;
  try{
    const res = await fetch('/api/verify-session?session_id='+encodeURIComponent(sessionId));
    if(!res.ok) throw new Error('unavailable');
    const data = await res.json();
    el.innerHTML = data.paid
      ? `<p class="text-sm text-green-700 dark:text-green-400 mt-2">Payment of ${fmt((data.amount_total||0)/100)} confirmed via Stripe.</p>`
      : `<p class="text-sm text-gold mt-2">Payment not yet confirmed — we'll email you once it clears.</p>`;
  } catch(e){ el.innerHTML = ''; }
}

/* ---------------------------- ROUTER ---------------------------- */
function go(hash){
  if(!hash) hash = '#/home';
  const app = document.getElementById('app');
  const parts = hash.replace('#/','').split('/').filter(Boolean);
  const route = parts[0] || 'home';
  let html = '';

  if(route==='home') html = pageHome();
  else if(route==='shop' && parts[1]==='page') html = pageShop({}, {page:+parts[2]||1});
  else if(route==='shop') html = pageShop({});
  else if(route==='category') html = pageShop({}, {title:parts[1], eyebrow:parts[1]+"'s Edit", filter:p=>p.category===parts[1]});
  else if(route==='new-arrivals') html = pageShop({}, {title:'New Arrivals', eyebrow:'Just landed', filter:p=>p.isNew});
  else if(route==='best-sellers') html = pageShop({}, {title:'Best Sellers', eyebrow:'Most loved', filter:p=>p.isBest});
  else if(route==='sale') html = pageShop({}, {title:'Sale', eyebrow:'Limited time', filter:p=>p.onSale});
  else if(route==='search') html = pageShop({}, {title:'Search Results for "'+decodeURIComponent(parts[1])+'"', eyebrow:'Search', query:decodeURIComponent(parts[1])});
  else if(route==='product') html = pageProduct(parts[1]);
  else if(route==='cart') html = pageCart();
  else if(route==='checkout') html = pageCheckout();
  else if(route==='order-confirmation') html = pageOrderConfirmation(parts[1]);
  else if(route==='order-tracking') html = pageOrderTracking();
  else if(route==='wishlist') html = pageWishlist();
  else if(route==='account') html = pageAccount(parts[1]||'overview');
  else if(route==='about') html = pageAbout();
  else if(route==='contact') html = pageContact();
  else if(route==='faq') html = pageFAQ();
  else if(route==='admin') html = pageAdmin(parts[1]||'dashboard');
  else html = `<div class="max-w-3xl mx-auto px-5 py-28 text-center"><h1 class="font-display text-3xl mb-4">Page not found</h1><a href="#/home" class="thread">Return home</a></div>`;

  app.innerHTML = html;
  window.scrollTo({top:0, behavior:'instant' in window ? 'instant':'auto'});
  renderNav();
  bindWishButtons(app);

  if(route==='shop'||route==='category'||route==='new-arrivals'||route==='best-sellers'||route==='sale'||route==='search') bindShopEvents();
  if(route==='product') bindProductEvents(parts[1]);
  if(route==='cart') bindCartEvents();
  if(route==='checkout') bindCheckoutEvents();
  if(route==='order-tracking') bindTrackEvents();
  if(route==='order-confirmation'){
    const sessionId = new URLSearchParams(window.location.search).get('session_id');
    if(sessionId) verifyPayment(sessionId);
  }
  if(route==='account') bindAccountEvents();
  if(route==='contact'){ const f=document.getElementById('contact-form'); if(f) f.onsubmit=(e)=>{e.preventDefault(); toast('Message sent — we will reply within 1 business day'); f.reset();}; }
  const nlf = document.getElementById('newsletter-form');
  if(nlf) nlf.onsubmit = (e)=>{ e.preventDefault(); toast('Subscribed — welcome to Atelier Noir'); nlf.reset(); };

  revealOnScroll();
}

window.addEventListener('hashchange', ()=>go(location.hash));
window.addEventListener('DOMContentLoaded', ()=>{ renderNav(); renderFooter(); go(location.hash || '#/home'); });
</script>
